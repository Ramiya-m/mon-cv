const faceImg = new Image();
faceImg.onload = function(){
  console.log('Photo chargée:', faceImg.width, 'x', faceImg.height);
  startScene();
};
faceImg.onerror = function(e){
  console.error('Erreur chargement photo', e);
  startScene(); // démarre quand même
};
faceImg.src = FACE_B64;

function startScene(){
  const container = document.getElementById('tc');
  // Vider le loader
  container.innerHTML = '';
  
  const W = container.clientWidth, H = 700;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(28, W/H, 0.1, 1000);
  camera.position.set(0, 1.5, 13.5);
  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.75));
  const k = new THREE.DirectionalLight(0xffffff, 0.85); k.position.set(6,10,8); scene.add(k);
  const f = new THREE.DirectionalLight(0xc8e0db, 0.4); f.position.set(-5,2,5); scene.add(f);
  const t = new THREE.DirectionalLight(0xffffff, 0.3); t.position.set(0,10,0); scene.add(t);

  const BW=6.0, BH=4.6, BD=2.4;
  const TEAL='#52A89E', TEAL_DARK='#1A5D52', YELLOW='#F4E84A', WHITE='#FFFFFF', TEXT_DARK='#1A3A35';

  function mkc(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c;}

  function front(){
    const w=1200, h=Math.round(1200*BH/BW);
    const c=mkc(w,h),ctx=c.getContext('2d');

    ctx.fillStyle=TEAL; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle=TEAL_DARK; ctx.lineWidth=2; ctx.strokeRect(2,2,w-4,h-4);

    // === PHOTO (cercle) - avec fallback visible si problème ===
    const cx = w-160, cy = 175, radius = 110;
    
    // Cercle blanc en arrière-plan (toujours visible)
    ctx.fillStyle = WHITE;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fill();
    
    // Bordure blanche épaisse
    ctx.strokeStyle = WHITE;
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.stroke();
    
    // Photo dans le cercle
    if(faceImg.complete && faceImg.naturalWidth > 0){
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius-4, 0, Math.PI*2);
      ctx.clip();
      ctx.drawImage(faceImg, cx-radius+2, cy-radius+2, (radius-2)*2, (radius-2)*2);
      ctx.restore();
    } else {
      // Fallback : initiales si photo absente
      ctx.fillStyle = TEAL_DARK;
      ctx.font='bold 70px Arial';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('RM', cx, cy);
    }

    // Nom
    ctx.fillStyle=WHITE;
    ctx.textBaseline='alphabetic';
    ctx.textAlign='left';
    ctx.font='bold 92px Arial';
    ctx.fillText('RAMIYA', 30, 130);
    ctx.font='bold 56px Arial';
    ctx.fillText('MAHENDRAN', 30, 185);

    ctx.font='bold 26px Arial';
    ctx.fillText('Communication Interne', 30, 230);
    ctx.fillText('& Gestion de Projets', 30, 265);

    ctx.font='italic 22px Arial';
    ctx.fillText('Alternance · Septembre 2026', 30, 300);

    // Sticker jaune
    ctx.fillStyle=YELLOW;
    ctx.fillRect(800, 305, 370, 90);
    ctx.strokeStyle=TEAL_DARK;
    ctx.lineWidth=3;
    ctx.strokeRect(800, 305, 370, 90);
    ctx.fillStyle=TEXT_DARK;
    ctx.font='bold 32px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('1 an d\u2019alternance', 985, 335);
    ctx.font='bold 20px Arial';
    ctx.fillText('Bac+5 — MBA ISCOM', 985, 370);
    ctx.textAlign='left';
    ctx.textBaseline='alphabetic';

    // Encadré rythme
    ctx.fillStyle=WHITE;
    ctx.fillRect(30, 335, 360, 90);
    ctx.strokeStyle=TEAL_DARK;
    ctx.lineWidth=2;
    ctx.strokeRect(30, 335, 360, 90);
    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 16px Arial';
    ctx.fillText('RYTHME D\u2019ALTERNANCE', 45, 360);
    ctx.fillStyle=TEXT_DARK;
    ctx.font='bold 22px Arial';
    ctx.fillText('2 jours école / 10 jours entreprise', 45, 390);
    ctx.font='14px Arial';
    ctx.fillText('Démarrage : septembre 2026 · Durée : 1 an', 45, 415);

    // Encadré formation
    ctx.fillStyle=WHITE;
    ctx.fillRect(405, 335, 380, 90);
    ctx.strokeRect(405, 335, 380, 90);
    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 16px Arial';
    ctx.fillText('FORMATION EN COURS', 420, 360);
    ctx.fillStyle=TEXT_DARK;
    ctx.font='bold 18px Arial';
    ctx.fillText('MBA Direction Artistique', 420, 385);
    ctx.fillText('& Création Publicitaire', 420, 408);

    // Bandeau bas — profil
    ctx.fillStyle=TEAL_DARK;
    ctx.fillRect(0, h-65, w, 65);
    ctx.fillStyle=WHITE;
    ctx.font='bold 14px Arial';
    ctx.textBaseline='middle';
    ctx.fillText('PROFIL', 30, h-45);
    ctx.font='13px Arial';
    ctx.fillText('Étudiante en MBA Direction Artistique à l\u2019ISCOM, double background Marketing Digital (INSEEC) et Communication (NEOMA).', 30, h-22);

    // Contact à droite du bandeau
    ctx.font='12px Arial';
    ctx.textAlign='right';
    ctx.fillText('ramiya.mahendran@gmail.com  ·  06 95 02 99 62  ·  Houilles 78800', w-30, h-22);
    ctx.textAlign='left';

    return new THREE.CanvasTexture(c);
  }

          'Réalisation de vidéos courtes, infographies et',
          'templates via la Suite Adobe (Ps, Ai, Pr).',
          'Promotion des programmes de formation pour',
          'booster l\u2019engagement des collaborateurs.',
          'Organisation et animation de webinaires sur les',
          'nouveaux outils et cursus.',
          'Animation du réseau social interne et support aux',
          'équipes sur les projets digitaux.'
        ]
      },
      {
        title:'Graphiste & Social Media Manager',
        company:'QARSON', dates:'2023 – 2025',
        bullets:[
          'Gestion de la stratégie de contenu sur les réseaux.',
          'Création de visuels, vidéos et textes pour les pubs.',
          'Animation et modération des communautés en ligne.',
          'Analyse des performances et ajustement des actions.',
          'Création et gestion de campagnes payantes.',
          'Réalisation de vidéos et montage pour les RS.',
          'Suivi des tendances et de la concurrence.'
        ]
      },
      {
        title:'Community Manager',
        company:'AGENCE ATMOSPHERES', dates:'2022 – 2023',
        bullets:[
          'Stratégie de communication & planning éditorial.',
          'Création de contenu créatif (photos, vidéos, reels,',
          'TikTok, challenges).',
          'Animation des communautés Instagram et TikTok.',
          'Veille tendances et analyse des performances.',
          'Organisation d\u2019événements internes (afterworks).',
          'Aide à l\u2019organisation de salons et conférences.',
          'Communication interne (podcasts, newsletters).'
        ]
      }
    ];

    exps.forEach(e=>{
      ctx.fillStyle=TEAL_DARK;
      ctx.font='bold 14px Arial';
      ctx.fillText(e.title.toUpperCase(), colL, leftY); leftY+=18;
      ctx.fillStyle=TEXT_DARK;
      ctx.font='bold 12px Arial';
      ctx.fillText(e.company, colL, leftY);
      ctx.font='italic 12px Arial';
      ctx.textAlign='right';
      ctx.fillText(e.dates, colL+560, leftY);
      ctx.textAlign='left';
      leftY+=16;
      ctx.font='12px Arial';
      e.bullets.forEach(b=>{
        ctx.fillText('· '+b, colL, leftY);
        leftY+=14;
      });
      leftY+=10;
    });

    // === FORMATION + COMPÉTENCES ===
    let rightY = 80;
    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 19px Arial';
    ctx.fillText('FORMATION', colR, rightY); rightY+=8;
    ctx.strokeStyle=TEAL;
    ctx.beginPath(); ctx.moveTo(colR, rightY+4); ctx.lineTo(colR+560, rightY+4); ctx.stroke();
    rightY+=22;

    const formations=[
      ['MBA Direction Artistique & Création Publicitaire', 'ISCOM Paris', '2026 (en cours)'],
      ['MSc Communication d\u2019Entreprise', 'NEOMA Business School Paris', '2025 – 2026'],
      ['Master Marketing Digital, Innovation & Brand Mgmt', 'INSEEC Grande École Bordeaux', '2023 – 2025'],
      ['Bachelor Marketing Digital & Social Media', 'Digital College Paris', '2022 – 2023']
    ];

    formations.forEach(fo=>{
      ctx.fillStyle=TEAL_DARK;
      ctx.font='bold 13px Arial';
      ctx.fillText(fo[0], colR, rightY); rightY+=16;
      ctx.fillStyle=TEXT_DARK;
      ctx.font='12px Arial';
      ctx.fillText(fo[1], colR, rightY);
      ctx.font='italic 12px Arial';
      ctx.textAlign='right';
      ctx.fillText(fo[2], colR+560, rightY);
      ctx.textAlign='left';
      rightY+=20;
    });
    rightY+=12;

    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 19px Arial';
    ctx.fillText('COMPÉTENCES', colR, rightY); rightY+=8;
    ctx.strokeStyle=TEAL;
    ctx.beginPath(); ctx.moveTo(colR, rightY+4); ctx.lineTo(colR+560, rightY+4); ctx.stroke();
    rightY+=22;

    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 13px Arial';
    ctx.fillText('Logiciels maîtrisés', colR, rightY); rightY+=18;
    ctx.fillStyle=TEXT_DARK;
    ctx.font='12px Arial';
    [
      'Suite Adobe : Photoshop · Illustrator · Premiere Pro',
      'Figma · Miro · Canva Pro',
      'Wordpress · Elementor',
      'MailChimp · InShot · Playplay',
      'Microsoft Office'
    ].forEach(l=>{ctx.fillText('· '+l, colR, rightY); rightY+=15;});
    rightY+=12;

    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 13px Arial';
    ctx.fillText('Savoir-faire', colR, rightY); rightY+=18;
    ctx.fillStyle=TEXT_DARK;
    ctx.font='12px Arial';
    [
      'Communication interne & gestion de projets',
      'Direction artistique & création publicitaire',
      'Chaîne graphique & montage vidéo',
      'Stratégie de contenu & social media',
      'Conception d\u2019interfaces (UI/UX)'
    ].forEach(l=>{ctx.fillText('· '+l, colR, rightY); rightY+=15;});
    rightY+=15;

    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 19px Arial';
    ctx.fillText('LANGUES', colR, rightY); rightY+=8;
    ctx.strokeStyle=TEAL;
    ctx.beginPath(); ctx.moveTo(colR, rightY+4); ctx.lineTo(colR+560, rightY+4); ctx.stroke();
    rightY+=22;
    ctx.fillStyle=TEXT_DARK;
    ctx.font='13px Arial';
    ctx.fillText('Français : C2  ·  Tamoul : C2  ·  Anglais : B2  ·  Espagnol : A2', colR, rightY);

    ctx.fillStyle=TEAL_DARK;
    ctx.fillRect(0, h-35, w, 35);
    ctx.fillStyle=WHITE;
    ctx.font='12px Arial';
    ctx.textBaseline='middle';
    ctx.fillText('Ramiya Mahendran  ·  Houilles, 78800  ·  Permis B  ·  Disponible Septembre 2026', 30, h-17);

    return new THREE.CanvasTexture(c);
  }

  function rightSide(){
    const w=600, h=Math.round(600*BH/BD);
    const c=mkc(w,h),ctx=c.getContext('2d');
    ctx.fillStyle=TEAL; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle=TEAL_DARK; ctx.lineWidth=2; ctx.strokeRect(2,2,w-4,h-4);

    ctx.save();
    ctx.translate(w/2, h/2);
    ctx.rotate(-Math.PI/2);

    ctx.fillStyle=WHITE;
    ctx.font='bold 50px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('RAMIYA MAHENDRAN', 0, -200);

    ctx.font='bold 22px Arial';
    ctx.fillText('Communication Interne', 0, -150);
    ctx.fillText('& Gestion de Projets', 0, -120);
    ctx.font='italic 18px Arial';
    ctx.fillText('Alternance · 1 an · Septembre 2026', 0, -85);

    ctx.fillStyle=WHITE;
    ctx.fillRect(-280, -50, 560, 200);
    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 14px Arial';
    ctx.fillText('FORMATION EN COURS', 0, -25);
    ctx.fillStyle=TEXT_DARK;
    ctx.font='bold 16px Arial';
    ctx.fillText('MBA Direction Artistique', 0, 0);
    ctx.font='14px Arial';
    ctx.fillText('ISCOM Paris', 0, 22);

    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 14px Arial';
    ctx.fillText('CONTACT', 0, 55);
    ctx.fillStyle=TEXT_DARK;
    ctx.font='14px Arial';
    ctx.fillText('ramiya.mahendran@gmail.com', 0, 80);
    ctx.fillText('06 95 02 99 62  ·  Houilles 78800', 0, 105);
    ctx.fillText('Permis B', 0, 128);

    ctx.fillStyle=TEXT_DARK;
    let bx = -150;
    for(let i=0;i<40;i++){
      const bw = 2 + Math.random()*4;
      ctx.fillRect(bx, 175, bw, 55);
      bx += bw + 2 + Math.random()*2;
    }
    ctx.fillStyle=WHITE;
    ctx.font='bold 13px monospace';
    ctx.fillText('CV-RM-2026', 0, 248);

    ctx.restore();
    return new THREE.CanvasTexture(c);
  }

  function leftSide(){
    const w=600, h=Math.round(600*BH/BD);
    const c=mkc(w,h),ctx=c.getContext('2d');
    ctx.fillStyle=TEAL; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle=TEAL_DARK; ctx.lineWidth=2; ctx.strokeRect(2,2,w-4,h-4);

    ctx.save();
    ctx.translate(w/2, h/2);
    ctx.rotate(Math.PI/2);

    ctx.fillStyle=WHITE;
    ctx.font='bold 28px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('COMPÉTENCES', 0, -200);

    ctx.fillStyle=WHITE;
    ctx.fillRect(-280, -170, 560, 200);
    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 14px Arial';
    ctx.fillText('LOGICIELS MAÎTRISÉS', 0, -148);
    ctx.fillStyle=TEXT_DARK;
    ctx.font='14px Arial';
    [
      'Suite Adobe (Ps, Ai, Pr)',
      'Figma · Miro · Canva Pro',
      'Wordpress · Elementor',
      'MailChimp · InShot · Playplay',
      'Microsoft Office'
    ].forEach((tt,i)=>ctx.fillText(tt, 0, -118 + i*26));

    ctx.fillStyle=WHITE;
    ctx.fillRect(-280, 60, 560, 170);
    ctx.fillStyle=TEAL_DARK;
    ctx.font='bold 14px Arial';
    ctx.fillText('LANGUES', 0, 85);
    ctx.fillStyle=TEXT_DARK;
    ctx.font='14px Arial';
    ctx.fillText('Français : C2', 0, 115);
    ctx.fillText('Tamoul : C2', 0, 140);
    ctx.fillText('Anglais : B2', 0, 165);
    ctx.fillText('Espagnol : A2', 0, 190);

    ctx.restore();
    return new THREE.CanvasTexture(c);
  }

  function topSide(){
    const w=1200, h=Math.round(1200*BD/BW);
    const c=mkc(w,h),ctx=c.getContext('2d');
    ctx.fillStyle=TEAL_DARK; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle=WHITE; ctx.lineWidth=2; ctx.strokeRect(15,15,w-30,h-30);

    ctx.fillStyle=WHITE;
    ctx.textBaseline='middle';
    ctx.textAlign='left';
    ctx.font='bold 56px Arial';
    ctx.fillText('RAMIYA MAHENDRAN', 40, h/2);
    ctx.font='22px Arial';
    ctx.textAlign='right';
    ctx.fillText('Communication & Gestion de Projets', w-50, h/2);

    return new THREE.CanvasTexture(c);
  }

  function bottomSide(){
    const w=1200, h=Math.round(1200*BD/BW);
    const c=mkc(w,h),ctx=c.getContext('2d');
    ctx.fillStyle=WHITE; ctx.fillRect(0,0,w,h);
    ctx.strokeStyle=TEAL_DARK; ctx.lineWidth=2; ctx.strokeRect(15,15,w-30,h-30);
    ctx.fillStyle=TEXT_DARK;
    ctx.font='bold 24px Arial';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('Ramiya Mahendran  ·  Disponible Septembre 2026  ·  Houilles, 78800', w/2, h/2);
    return new THREE.CanvasTexture(c);
  }

  // Construction unique des matériaux (la photo est déjà chargée)
  const mat=(tex)=>new THREE.MeshStandardMaterial({map:tex,roughness:0.55,metalness:0.05});
  const materials = [
    mat(rightSide()),
    mat(leftSide()),
    mat(topSide()),
    mat(bottomSide()),
    mat(front()),
    mat(back())
  ];

  const box = new THREE.Mesh(new THREE.BoxGeometry(BW,BH,BD), materials);
  scene.add(box);

  // Ombre
  const sc=document.createElement('canvas'); sc.width=256; sc.height=256;
  const sctx=sc.getContext('2d');
  const grad=sctx.createRadialGradient(128,128,20,128,128,120);
  grad.addColorStop(0,'rgba(0,0,0,0.4)'); grad.addColorStop(1,'rgba(0,0,0,0)');
  sctx.fillStyle=grad; sctx.fillRect(0,0,256,256);
  const shadow=new THREE.Mesh(
    new THREE.PlaneGeometry(9,5),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(sc),transparent:true,depthWrite:false})
  );
  shadow.rotation.x=-Math.PI/2;
  shadow.position.y=-BH/2-0.05;
  scene.add(shadow);

  let drag=false, px=0, py=0, rotY=-0.45, rotX=0.05, tY=rotY, tX=rotX, auto=true, cZ=13.5, tZ=13.5;
  const btnR=document.getElementById('btn-rotate');

  container.addEventListener('mousedown',e=>{
    drag=true; px=e.clientX; py=e.clientY;
    container.style.cursor='grabbing'; auto=false;
    btnR.textContent='\u25B6 Rotation';
  });
  window.addEventListener('mouseup',()=>{drag=false; container.style.cursor='grab';});
  window.addEventListener('mousemove',e=>{
    if(!drag) return;
    tY+=(e.clientX-px)*0.008;
    tX+=(e.clientY-py)*0.008;
    tX=Math.max(-1.2,Math.min(1.2,tX));
    px=e.clientX; py=e.clientY;
  });

  container.addEventListener('touchstart',e=>{
    if(e.touches.length===1){
      drag=true; px=e.touches[0].clientX; py=e.touches[0].clientY;
      auto=false; btnR.textContent='\u25B6 Rotation';
    }
  });
  container.addEventListener('touchmove',e=>{
    if(!drag||e.touches.length!==1) return;
    tY+=(e.touches[0].clientX-px)*0.008;
    tX+=(e.touches[0].clientY-py)*0.008;
    tX=Math.max(-1.2,Math.min(1.2,tX));
    px=e.touches[0].clientX; py=e.touches[0].clientY;
    e.preventDefault();
  },{passive:false});
  container.addEventListener('touchend',()=>{drag=false;});

  container.addEventListener('wheel',e=>{
    tZ+=e.deltaY*0.01;
    tZ=Math.max(8,Math.min(22,tZ));
    e.preventDefault();
  },{passive:false});

  btnR.addEventListener('click',()=>{
    auto=!auto;
    btnR.textContent=auto?'\u23F8 Pause':'\u25B6 Rotation';
  });
  document.getElementById('btn-face').addEventListener('click',()=>{
    auto=false; btnR.textContent='\u25B6 Rotation'; tY=0; tX=0;
  });
  document.getElementById('btn-back').addEventListener('click',()=>{
    auto=false; btnR.textContent='\u25B6 Rotation'; tY=Math.PI; tX=0;
  });
  document.getElementById('btn-side').addEventListener('click',()=>{
    auto=false; btnR.textContent='\u25B6 Rotation'; tY=-Math.PI/2; tX=0;
  });
  document.getElementById('btn-top').addEventListener('click',()=>{
    auto=false; btnR.textContent='\u25B6 Rotation'; tY=0; tX=-Math.PI/2 + 0.1;
  });

  function loop(){
    requestAnimationFrame(loop);
    if(auto&&!drag) tY+=0.005;
    rotY+=(tY-rotY)*0.1;
    rotX+=(tX-rotX)*0.1;
    cZ+=(tZ-cZ)*0.1;
    box.rotation.y=rotY;
    box.rotation.x=rotX;
    camera.position.z=cZ;
    renderer.render(scene,camera);
  }
  loop();

  window.addEventListener('resize',()=>{
    const nw=container.clientWidth;
    renderer.setSize(nw,H);
    camera.aspect=nw/H;
    camera.updateProjectionMatrix();
  });
}
</script>
</body>
</html>
